name: IconFold
options:
  bundleIdPrefix: com.iconfold
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: IconFold
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  IconFold:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iconfold.app
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: IconFold
        CFBundleDisplayName: IconFold
        CFBundleIdentifier: com.iconfold.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: IconFold
        LSMinimumSystemVersion: "12.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication